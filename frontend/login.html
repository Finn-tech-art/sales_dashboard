<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In | Bizard Leads</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderAuthShell({
        title: "Log in",
        subtitle: "Return to your lead and workflow dashboard.",
        content: `
          <form class="form" id="login-form">
            <div class="field"><label>Email</label><input name="email" type="email" required /></div>
            <div class="field"><label>Password</label><input name="password" type="password" required /></div>
            <button class="btn btn-primary" type="submit">Access workspace</button>
            <div id="login-error" class="label"></div>
          </form>
        `,
      });

      document.getElementById("login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(event.target).entries());
          const result = await apiFetch("/auth/login", { method: "POST", body: JSON.stringify(payload) });
          setTokens(result.access_token, result.refresh_token);
          window.location.href = "/dashboard.html";
        } catch (error) {
          document.getElementById("login-error").textContent = "Unable to log in with those credentials.";
        }
      });
    });
  </script>
</body>
</html>
