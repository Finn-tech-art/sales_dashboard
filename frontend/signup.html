<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Bizard Leads</title>
  <link rel="stylesheet" href="/css/base.css?v=20260319" />
  <link rel="stylesheet" href="/css/layout.css?v=20260319" />
  <link rel="stylesheet" href="/css/components.css?v=20260319" />
  <link rel="stylesheet" href="/styles/design-system.css?v=20260319" />
</head>
<body>
  <script src="/js/api.js?v=20260319"></script>
  <script src="/js/layout.js?v=20260319"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderAuthShell({
        title: "Create Workspace",
        subtitle: "Provision Your Lead Automation And Social Content Account.",
        content: `
          <form class="form" id="signup-form">
            <div class="field floating-field"><input name="full_name" type="text" placeholder=" " /><label>Full Name</label></div>
            <div class="field floating-field"><input name="company_name" type="text" placeholder=" " /><label>Company Name</label></div>
            <div class="field floating-field"><input name="email" type="email" placeholder=" " required /><label>Email Address</label></div>
            <div class="field floating-field"><input name="password" type="password" placeholder=" " required /><label>Password</label></div>
            <button class="btn btn-primary" type="submit">Create Account</button>
            <div id="signup-status" class="label"></div>
          </form>
        `,
      });

      document.getElementById("signup-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const status = document.getElementById("signup-status");
        try {
          const payload = Object.fromEntries(new FormData(event.target).entries());
          await apiFetch("/auth/signup", { method: "POST", body: JSON.stringify(payload), loaderTitle: "Creating Workspace", loaderSubtitle: "Securing Your New Account" });
          status.textContent = "Account Created. You Can Log In Now.";
          showToast("Account Created Successfully");
        } catch (error) {
          status.textContent = error.message || "Could not create account.";
          showToast(status.textContent, "error");
        }
      });
    });
  </script>
</body>
</html>
