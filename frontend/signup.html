<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Bizard Leads</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderAuthShell({
        title: "Create workspace",
        subtitle: "Provision your outreach automation account.",
        content: `
          <form class="form" id="signup-form">
            <div class="field"><label>Full name</label><input name="full_name" type="text" /></div>
            <div class="field"><label>Company</label><input name="company_name" type="text" /></div>
            <div class="field"><label>Email</label><input name="email" type="email" required /></div>
            <div class="field"><label>Password</label><input name="password" type="password" required /></div>
            <button class="btn btn-primary" type="submit">Create account</button>
            <div id="signup-status" class="label"></div>
          </form>
        `,
      });

      document.getElementById("signup-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(event.target).entries());
          await apiFetch("/auth/signup", { method: "POST", body: JSON.stringify(payload) });
          document.getElementById("signup-status").textContent = "Account created. You can log in now.";
        } catch (error) {
          document.getElementById("signup-status").textContent = "Could not create account.";
        }
      });
    });
  </script>
</body>
</html>
