# Tighten this list to the IPs or CIDR blocks of your trusted ingress or proxy.
# These defaults allow local development, Docker bridge traffic, and common
# internal RFC1918 ranges while blocking arbitrary public clients.
allow 127.0.0.1;
allow ::1;
allow 10.0.0.0/8;
allow 172.16.0.0/12;
allow 192.168.0.0/16;
deny all;
